{% set name = "rf-prediction-pipeline" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: .

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools
  run:
    - python >=3.7
    - pandas
    - scikit-learn ==1.6.1
    - blast
    - abricate

test:
  imports:
    - main
  commands:
    - python -c "import main; print('Import successful')"

about:
  home: https://github.com/yourusername/rf-prediction-pipeline
  license: MIT
  summary: RF prediction pipeline for pathogenicity assessment
  description: |
    A machine learning pipeline that uses Random Forest to predict pathogenicity
    levels (HIGH, INTERMEDIATE, LOW) from genomic data using BLAST and abricate
    analysis.
  doc_url: https://github.com/yourusername/rf-prediction-pipeline
  dev_url: https://github.com/yourusername/rf-prediction-pipeline

extra:
  recipe-maintainers:
    - your-github-username 